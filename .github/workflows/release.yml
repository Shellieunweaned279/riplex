name: Build Executables

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[gui]"
          pip install flet-desktop pyinstaller

      - name: Build CLI executable
        run: |
          pyinstaller --name riplex --onefile --console ^
            --hidden-import riplex_cli.commands.orchestrate ^
            --hidden-import riplex_cli.commands.rip ^
            --hidden-import riplex_cli.commands.organize ^
            --hidden-import riplex_cli.commands.lookup ^
            --hidden-import riplex_cli.commands.setup ^
            --collect-data dvdcompare_scraper ^
            src/riplex_cli/main.py
        shell: cmd

      - name: Build GUI executable
        run: |
          pyinstaller --name riplex-ui --onefile --windowed ^
            --hidden-import riplex_app.screens.welcome ^
            --hidden-import riplex_app.screens.disc_detection ^
            --hidden-import riplex_app.screens.metadata ^
            --hidden-import riplex_app.screens.release ^
            --hidden-import riplex_app.screens.selection ^
            --hidden-import riplex_app.screens.progress ^
            --hidden-import riplex_app.screens.done ^
            --hidden-import riplex_app.screens.folder_picker ^
            --hidden-import riplex_app.screens.organize_preview ^
            --hidden-import riplex_app.screens.organize_done ^
            --collect-all flet ^
            --collect-all flet_desktop ^
            --collect-data dvdcompare_scraper ^
            src/riplex_app/main.py
        shell: cmd

      - name: Package Windows artifacts
        run: |
          mkdir release
          copy dist\riplex.exe release\
          copy dist\riplex-ui.exe release\
        shell: cmd

      - uses: actions/upload-artifact@v4
        with:
          name: riplex-windows
          path: release/

  build-macos:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-13
            arch: x86_64
          - runner: macos-14
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[gui]"
          pip install flet-desktop pyinstaller

      - name: Build CLI executable
        run: |
          pyinstaller --name riplex --onefile --console \
            --hidden-import riplex_cli.commands.orchestrate \
            --hidden-import riplex_cli.commands.rip \
            --hidden-import riplex_cli.commands.organize \
            --hidden-import riplex_cli.commands.lookup \
            --hidden-import riplex_cli.commands.setup \
            --collect-data dvdcompare_scraper \
            src/riplex_cli/main.py

      - name: Build GUI app bundle
        run: |
          pyinstaller --name riplex-ui --onedir --windowed \
            --hidden-import riplex_app.screens.welcome \
            --hidden-import riplex_app.screens.disc_detection \
            --hidden-import riplex_app.screens.metadata \
            --hidden-import riplex_app.screens.release \
            --hidden-import riplex_app.screens.selection \
            --hidden-import riplex_app.screens.progress \
            --hidden-import riplex_app.screens.done \
            --hidden-import riplex_app.screens.folder_picker \
            --hidden-import riplex_app.screens.organize_preview \
            --hidden-import riplex_app.screens.organize_done \
            --collect-all flet \
            --collect-all flet_desktop \
            --collect-data dvdcompare_scraper \
            src/riplex_app/main.py

      - name: Package macOS artifacts
        run: |
          mkdir -p release
          cp dist/riplex release/riplex-${{ matrix.arch }}
          cd dist && zip -r ../release/riplex-ui-macos-${{ matrix.arch }}.zip riplex-ui.app

      - uses: actions/upload-artifact@v4
        with:
          name: riplex-macos-${{ matrix.arch }}
          path: release/

  release:
    needs: [build-windows, build-macos]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Prepare release files
        run: |
          mkdir release
          cp artifacts/riplex-windows/riplex.exe release/riplex-windows.exe
          cp artifacts/riplex-windows/riplex-ui.exe release/riplex-ui-windows.exe
          cp artifacts/riplex-macos-x86_64/riplex-x86_64 release/riplex-macos-x86_64
          cp artifacts/riplex-macos-x86_64/riplex-ui-macos-x86_64.zip release/
          cp artifacts/riplex-macos-arm64/riplex-arm64 release/riplex-macos-arm64
          cp artifacts/riplex-macos-arm64/riplex-ui-macos-arm64.zip release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release/riplex-windows.exe
            release/riplex-ui-windows.exe
            release/riplex-macos-x86_64
            release/riplex-ui-macos-x86_64.zip
            release/riplex-macos-arm64
            release/riplex-ui-macos-arm64.zip
